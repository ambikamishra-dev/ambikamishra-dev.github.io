<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="'Comic Sans MS','Segoe Print','Bradley Hand',cursive">
  <rect width="900" height="430" fill="#FFFFFF"/>
  <!-- dotted paper hint -->
  <g fill="#D8D2C4"><circle cx="30" cy="30" r="1.5"/><circle cx="90" cy="30" r="1.5"/><circle cx="150" cy="30" r="1.5"/><circle cx="30" cy="90" r="1.5"/><circle cx="870" cy="400" r="1.5"/><circle cx="810" cy="400" r="1.5"/><circle cx="870" cy="340" r="1.5"/></g>

  <!-- GATE 1: the door -->
  <g stroke="#1F2933" stroke-width="3" fill="none" stroke-linecap="round">
    <rect x="70" y="90" width="130" height="230" rx="6" transform="rotate(-0.6 135 205)"/>
    <circle cx="180" cy="205" r="6" fill="#1F2933"/>
  </g>
  <!-- keycard reader -->
  <rect x="215" y="170" width="46" height="70" rx="8" fill="none" stroke="#1B4FD8" stroke-width="3" transform="rotate(1 238 205)"/>
  <circle cx="238" cy="192" r="5" fill="#1B4FD8"/>
  <rect x="226" y="212" width="24" height="16" rx="3" fill="#1B4FD8" opacity="0.25"/>
  <!-- keycard -->
  <rect x="240" y="255" width="64" height="40" rx="6" fill="#FFE977" stroke="#1F2933" stroke-width="2.5" transform="rotate(-8 272 275)"/>
  <text x="248" y="281" font-size="13" fill="#1F2933" transform="rotate(-8 272 275)">perm set</text>

  <text x="60" y="66" font-size="21" fill="#1B4FD8">GATE 1 · OBJECT ACCESS</text>
  <text x="60" y="360" font-size="15" fill="#5B6470">can you enter the room at all?</text>
  <text x="60" y="382" font-size="15" fill="#5B6470">profiles · permission sets · FLS</text>

  <!-- divider -->
  <line x1="360" y1="70" x2="360" y2="380" stroke="#E86A5E" stroke-width="2.5" stroke-dasharray="7 7"/>
  <text x="330" y="52" font-size="19" fill="#E86A5E" transform="rotate(-2 360 45)">two gates, two toolboxes</text>

  <!-- GATE 2: cabinets -->
  <text x="410" y="66" font-size="21" fill="#1B4FD8">GATE 2 · RECORD ACCESS</text>

  <!-- cabinet 1: owner -->
  <g stroke="#1F2933" stroke-width="3" fill="none">
    <rect x="415" y="110" width="95" height="150" rx="5" transform="rotate(0.7 462 185)"/>
    <line x1="418" y1="160" x2="508" y2="160"/>
    <line x1="418" y1="210" x2="508" y2="211"/>
    <rect x="432" y="128" width="60" height="16" rx="3" fill="#FFE977" stroke="none"/>
  </g>
  <circle cx="462" cy="136" r="5" fill="none" stroke="#1F2933" stroke-width="2.5"/>
  <line x1="467" y1="136" x2="480" y2="136" stroke="#1F2933" stroke-width="2.5"/>
  <text x="416" y="290" font-size="14" fill="#5B6470">owner's own key</text>

  <!-- cabinet 2: hierarchy -->
  <g stroke="#1F2933" stroke-width="3" fill="none">
    <rect x="560" y="110" width="95" height="150" rx="5" transform="rotate(-0.5 607 185)"/>
    <line x1="562" y1="160" x2="653" y2="159"/>
    <line x1="562" y1="210" x2="653" y2="210"/>
  </g>
  <path d="M 607 62 L 607 104" stroke="#1B4FD8" stroke-width="3.5" fill="none" marker-end="url(#arr)"/>
  <text x="530" y="290" font-size="14" fill="#5B6470">role hierarchy:</text>
  <text x="530" y="308" font-size="14" fill="#5B6470">upward grant, one-way</text>

  <!-- cabinet 3: sharing rule sideways -->
  <g stroke="#1F2933" stroke-width="3" fill="none">
    <rect x="705" y="110" width="95" height="150" rx="5" transform="rotate(0.6 752 185)"/>
    <line x1="707" y1="160" x2="798" y2="160"/>
    <line x1="707" y1="210" x2="798" y2="211"/>
  </g>
  <path d="M 872 185 L 812 185" stroke="#1B4FD8" stroke-width="3.5" fill="none" marker-end="url(#arr)"/>
  <text x="700" y="290" font-size="14" fill="#5B6470">sharing rule:</text>
  <text x="700" y="308" font-size="14" fill="#5B6470">sideways, to roles</text>
  <text x="700" y="326" font-size="14" fill="#5B6470">&amp; public groups only</text>

  <!-- padlock on cabinet 1 bottom drawer = OWD -->
  <g transform="translate(452 222)">
    <rect x="0" y="8" width="22" height="16" rx="3" fill="#E86A5E"/>
    <path d="M 4 8 v-4 a 7 7 0 0 1 14 0 v4" stroke="#E86A5E" stroke-width="3" fill="none"/>
  </g>
  <text x="415" y="340" font-size="15" fill="#E86A5E" transform="rotate(-1.5 500 335)">OWD Private = every drawer starts locked</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#1B4FD8"/>
    </marker>
  </defs>
</svg>
